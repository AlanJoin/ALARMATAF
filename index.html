<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width, 
				initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>ALARMATAF</title>
	<link rel="icon" type="image/png" href="img/alarme.png">
</head>

<body>
	<!-- Importation de la musique d'alarme -->
    <audio id="musique_alarme" src="mus/outer_wilds.mp3" preload="auto" autoplay></audio>
	<audio id="musique_alarme_madonna" src="mus/madonna.mp3" preload="auto" autoplay></audio>


	<div class="grid-clock">
		<div class="clock">
			<h1>
				ALARMATAF<sup>&copy</sup>
			</h1>

			<h3>
				Petite alarme pour se rappeler de l'envoi des TAFs <br> (style de la page en cours)
			</h3>

			<!-- Affichage de l'heure actuelle-->
			<div class="temps" id="temps">
				00:00:00
			</div>

			<div>
				Alarme pour l'envoi des TAFs :
				<label class="switch">
					<input type="checkbox" onclick="setAlarmeEnvoiTAF()" autocomplete="off" id="alarme-envoi-TAF">
					<span class="slider round"></span>
				</label>
			</div>

			<div>
				Alarme pour la préparation des TAFs :
				<label class="switch">
					<input type="checkbox" onclick="setAlarmePrepaTAF()" autocomplete="off" id="alarme-prepa-TAF">
					<span class="slider round"></span>
				</label>
			</div>

			<div class="input-row">

				<p>Programmer une nouvelle alarme <br> en heure UTC :</p>
				<div class="input-field">
					<input type="date"
						id="dateAlarme"
						class="alarm-input"
						min="">
					<input type="time" id="alarmTime"
						class="alarm-input">
				</div>

				<button id="setAlarm">
					Définir l'alarme
				</button>
			</div>
		</div>
		<div class = "clock">
			<div><br>Prochaine(s) alarme(s) prévue(s) :</div>
			<div class="alarms" id="alarms"></div>
		</div>
	</div>

	<div class="case-madonna">
		Madonna mode : 
		<input type="checkbox" id="checkMadonna" onclick="madonnaMode()" autocomplete="off">
	</div>

	<script src="script.js"></script>


</body>

</html>
