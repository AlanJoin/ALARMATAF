<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width, 
				initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>ALARMATAF</title>
	<link rel="icon" type="image/png" href="img/alarme.png">
</head>

<body>
	<!-- Importation de la musique d'alarme -->
    <audio id="musique_alarme" src="mus/test.mp3" preload="auto"></audio>
	<audio id="musique_alarme_madonna" src="mus/madonna.mp3" preload="auto"></audio>

	<div class="clock">
		<h1>
			ALARMATAF<sup>&copy</sup>
		</h1>

		<h3>
			Petite alarme pour se rappeler de l'envoi des TAFs
		</h3>

		<!-- Affichage de l'heure actuelle-->
		<div class="temps" id="temps">
			00:00:00
		</div>

		<div class="input-row">

			<p>Programmer une nouvelle alarme (en heure UTC) :</p>
			<div class="input-field">
				<input type="date"
					id="dateAlarme"
					class="alarm-input"
					min="">
				<input type="time" id="alarmTime"
					class="alarm-input">
			</div>

			<button id="setAlarm">
				Définir l'alarme
			</button>
		</div>

		<div><br>Prochaine(s) alarme(s) prévues :</div>
		<div class="alarms" id="alarms"></div>

		<div>Madonna mode : <input type="checkbox" id="checkMadonna" onclick="madonnaMode()" autocomplete="off"></div>

	</div>

	<script src="script.js"></script>


</body>

</html>
