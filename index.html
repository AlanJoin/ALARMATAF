<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width, 
				initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=VT323&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
	<title>ALARMATAF</title>
	<link rel="icon" type="image/png" href="img/alarme.png">
</head>

<body>
	<!-- Importation de la musique d'alarme -->
    <audio id="musique_alarme" src="mus/outer_wilds.mp3" preload="auto"></audio>
	<audio id="musique_alarme_madonna" src="mus/madonna.mp3" preload="auto"></audio>
	<audio id="musique_test" src="mus/lizard-button.mp3" preload="auto"></audio>

	<div class="grid-clock">

		<div class = "entete">
			<h1>
				ALARMATAF<sup>&copy</sup>
			</h1>

			<h3>
				Petite alarme pour se rappeler de l'envoi des TAFs <br> (style de la page en cours)
			</h3>

			<!-- Affichage de l'heure actuelle-->
			<div id="horloge">			
				<h3 class="titre-columns">
				<div class="temps" id="temps">
					00:00:00
				</div>
				</h3>
			</div>
		</div>

		<div class="clock-principale">
			<h3 class="titre-columns">Configuration des alarmes</h3>
			<div class="choix-reveil">
				<div class="box-switch">
				<label><b><font color="#6356D7">Envoi des TAFs</font></b> 10 minutes avant diffusion</label>
				<label class="switch">
					<input type="checkbox" onclick="setAlarmeEnvoiTAF()" autocomplete="off" id="alarme-envoi-TAF">
					<span class="slider round"></span>
				</label>
				</div>

				<div class="box-switch">
					<label><b><font color="#3984F3">Préparation des TAFs</font></b> 1 heure avant diffusion</label>
					<label class="switch">
						<input type="checkbox" onclick="setAlarmePrepaTAF()" autocomplete="off" id="alarme-prepa-TAF">
						<span class="slider round"></span>
					</label>
				</div>

				<div class="box-switch">
					<label><b><font color="#11BCAB">Réveil nocturne</font></b> 5 heures du matin</label>
					<label class="switch">
						<input type="checkbox" onclick="setReveilMatin()" autocomplete="off" id="alarme-reveil-vac">
						<span class="slider round"></span>
					</label>
				</div>
			</div>


			<div class="input-row">

				<h3>Programmer une nouvelle alarme (en heure UTC)</h3>
				<div class="input-field">
					<input type="date"
						id="dateAlarme"
						class="alarm-input"
						min="">
					<input type="time" id="alarmTime"
						class="alarm-input">
					<button id="setAlarm">
						Définir
					</button>
				</div>
			</div>
		</div>

		<div class = "clock">
			<h3 class="titre-columns">Prochaine(s) alarme(s) prévue(s) :</h3>
			<div class="alarms" id="alarms"></div>
		</div>
	</div>

	<div id="boutonTestSon">
		<div>Test son</div>
		<input type="image" id="myimage" src="img/lizard.png" class="bouton_cercle" onclick="playTestMusic()"/>
	</div>

	<div class="case-madonna">
		Madonna mode : 
		<input type="checkbox" id="checkMadonna" onclick="madonnaMode()" autocomplete="off">
	</div>

	<script src="script.js"></script>


</body>

</html>
